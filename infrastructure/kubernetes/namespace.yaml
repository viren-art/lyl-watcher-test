apiVersion: v1
kind: Namespace
metadata:
  name: weather-impact-prod
  labels:
    name: weather-impact-prod
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: weather-impact-staging
  labels:
    name: weather-impact-staging
    environment: staging
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: weather-impact-prod
spec:
  hard:
    requests.cpu: "200"
    requests.memory: 400Gi
    limits.cpu: "400"
    limits.memory: 800Gi
    persistentvolumeclaims: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: weather-impact-prod
spec:
  limits:
  - max:
      cpu: "8"
      memory: 16Gi
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "1"
      memory: 2Gi
    defaultRequest:
      cpu: "500m"
      memory: 1Gi
    type: Container