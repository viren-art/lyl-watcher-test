steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-weather-impact-bess-location-optimization-system', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-weather-impact-bess-location-optimization-system']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-weather-impact-bess-location-optimization-system'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-weather-impact-bess-location-optimization-system'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
images:
  - 'gcr.io/$PROJECT_ID/ai-weather-impact-bess-location-optimization-system'
