        {
          "id": 2,
          "name": "Midwest",
          "code": "MW",
          "datacenter": "us-central-1",
          "timezone": "America/Chicago",
          "coordinates": {"lat": 41.8781, "lon": -87.6298},
          "weatherStations": ["KORD", "KMDW", "KMKE"],
          "gridProvider": "MISO"
        },
        {
          "id": 3,
          "name": "Western",
          "code": "WE",
          "datacenter": "us-west-1",
          "timezone": "America/Los_Angeles",
          "coordinates": {"lat": 34.0522, "lon": -118.2437},
          "weatherStations": ["KLAX", "KSFO", "KSAN"],
          "gridProvider": "CAISO"
        },
        {
          "id": 4,
          "name": "Southern",
          "code": "SO",
          "datacenter": "us-south-1",
          "timezone": "America/Chicago",
          "coordinates": {"lat": 29.7604, "lon": -95.3698},
          "weatherStations": ["KIAH", "KDFW", "KAUS"],
          "gridProvider": "ERCOT"
        },
        {
          "id": 5,
          "name": "Pacific",
          "code": "PA",
          "datacenter": "us-west-2",
