global:
  environment: production
  region: us-east-1
  
replicaCount:
  weatherPrediction: 3
  gridImpact: 3
  weatherIngestion: 5

image:
  repository: weather-impact
  pullPolicy: IfNotPresent
  tag: "1.0.0"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  weatherPrediction:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  gridImpact:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  weatherIngestion:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

database:
  host: timescaledb.weather-impact-prod.svc.cluster.local
  port: 5432
  name: weather_db
  ssl: true

kafka:
  brokers: kafka-0.kafka-headless.weather-impact-prod.svc.cluster.local:9092,kafka-1.kafka-headless.weather-impact-prod.svc.cluster.local:9092,kafka-2.kafka-headless.weather-impact-prod.svc.cluster.local:9092

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
  hosts:
    - host: api.weather-impact.com
      paths:
        - path: /api/v1/weather
          pathType: Prefix
          service: weather-prediction-service
        - path: /api/v1/grid
          pathType: Prefix
          service: grid-impact-service
  tls:
    - secretName: weather-impact-tls
      hosts:
        - api.weather-impact.com

monitoring:
  enabled: true
  prometheus:
    scrapeInterval: 30s
  grafana:
    enabled: true

regionConfig:
  regions:
    - id: 1
      name: Northeast
      code: NE
    - id: 2
      name: Midwest
      code: MW
    - id: 3
      name: Western
      code: WE
    - id: 4
      name: Southern
      code: SO
    - id: 5
      name: Pacific
      code: PA