          "coordinates": {"lat": 47.6062, "lon": -122.3321},
          "weatherStations": ["KSEA", "KPDX", "KBOI"],
          "gridProvider": "BPA"
        }
      ]
    }
  
  scaling-thresholds.yaml: |
    autoscaling:
      cpu_threshold: 70
      memory_threshold: 80
      scale_up_cooldown: 180
      scale_down_cooldown: 300
      min_replicas: 3
      max_replicas: 50
      target_requests_per_second: 100
    
    regions:
      phase1:
        - NE
        - MW
        - WE
        - SO
        - PA
      phase2_expansion:
        - SE  # Southeast
        - NW  # Northwest
        - SW  # Southwest
        - GL  # Great Lakes
        - MA  # Mid-Atlantic
      phase3_expansion:
        - RM  # Rocky Mountains
        - GP  # Great Plains
        - NP  # Northern Plains
        - SP  # Southern Plains
        - AK  # Alaska
        - HI  # Hawaii