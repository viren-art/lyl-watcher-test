apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-impact-service
  namespace: weather-impact-prod
  labels:
    app: grid-impact
    tier: backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app: grid-impact
  template:
    metadata:
      labels:
        app: grid-impact
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - grid-impact
              topologyKey: kubernetes.io/hostname
      containers:
      - name: grid-impact
        image: weather-impact/grid-impact-service:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: NODE_ENV
          value: "production"
        - name: TIMESCALEDB_HOST
          valueFrom:
            configMapKeyRef:
              name: database-config
              key: timescaledb_host
        - name: TIMESCALEDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: timescaledb_password
        - name: REGION_CONFIG_PATH
          value: "/config/regions.json"
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "4"
            memory: 8Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: region-config
          mountPath: /config
          readOnly: true
        - name: ml-models
          mountPath: /models
          readOnly: true
      volumes:
      - name: region-config
        configMap:
          name: region-config
      - name: ml-models
        persistentVolumeClaim:
          claimName: ml-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grid-impact-service
  namespace: weather-impact-prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: grid-impact